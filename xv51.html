<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project XV.51</title>
<link rel="icon" sizes="32x32" href="assets/images/Untitled-3 copy.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/7.19.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/7.19.1/firebase-auth.js"></script>
<style>

body{
margin:0;
background:#0d0d0d;
color:white;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
}

/* HEADER */

.header-xv{
position:fixed;
top:0;
width:100%;
z-index:100;
background:linear-gradient(180deg,rgba(13,13,13,0.95),rgba(13,13,13,0));
backdrop-filter:blur(10px);
}

.header-inner{
max-width:1400px;
margin:auto;
padding:30px 40px;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.header-title{
font-size:24px;
font-weight:bold;
letter-spacing:2px;
position: absolute;
left: 50%;
transform: translateX(-50%);
}

.auth-btn{
background:transparent;
color:#ffd11a;
border:1px solid #ffd11a;
padding:10px 24px;
border-radius:30px;
cursor:pointer;
position:absolute;
right:40px;
}

.auth-btn:hover{
background:#ffd11a;
color:#000;
}

/* MAIN LAYOUT */

.main-layout {
width: 100%;
min-height: 100vh;
}

/* VIDEO & DATE SECTION */

.video-section {
display: grid;
grid-template-columns: 1fr auto 1fr;
align-items: center;
width: 100%;
max-width: 1400px;
margin: 0 auto;
padding-top: 140px;
padding-bottom: 20px;
}

.date-side {
padding-left: 40px;
justify-self: start;
}

.date-text {
font-size: 14px;
color: #ffd11a;
letter-spacing: 2px;
margin-bottom: 8px;
text-transform: uppercase;
font-weight: 600;
}

.date-title {
font-size: 36px;
font-weight: 800;
background: linear-gradient(45deg,#fff,#ffd11a);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin: 0 0 5px 0;
}

.date-subtitle {
font-size: 14px;
color: #888;
letter-spacing: 4px;
margin: 0;
}

.video-wrapper {
justify-self: center;
}

.main-video{
width:800px;
max-width: 90vw;
border-radius:12px;
display:block;
box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* UNAUTH TEXT SECTION */

.unauth-text-section{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding: 20px 20px 80px 20px;
}

/* AUTH VIEW */

.auth-view{
display:none;
padding:40px 80px 80px 80px;
max-width: 1400px;
margin: 0 auto;
}

/* TIMELINE */

.timeline-item{
margin-bottom:80px;
border-left:2px solid #222;
padding-left:40px;
position:relative;
}

.timeline-item::before{
content:'';
position:absolute;
left:-7px;
top:0;
width:12px;
height:12px;
background:#ffd11a;
border-radius:50%;
}

.t-date{
font-size:28px;
font-weight:700;
margin-bottom:30px;
}

/* MEDIA GRID */

.media-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.media-item{
background:#111;
border-radius:16px;
overflow:hidden;
border:1px solid #222;
cursor:pointer;
transition:.3s;
}

.media-item:hover{
transform:translateY(-6px);
border-color:#ffd11a;
}

.media-box{
width:100%;
height:280px;
object-fit:cover;
background:#000;
}

.media-content{
padding:18px;
}

.media-title{
font-size:16px;
font-weight:600;
margin-bottom:6px;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.media-type-tag{
font-size:11px;
color:#ffd11a;
letter-spacing:2px;
text-transform: uppercase;
}

/* PREVIEW MODAL */

.preview-modal{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.preview-content{
max-width:90%;
max-height:90%;
display: flex;
align-items: center;
justify-content: center;
}

.preview-content img,
.preview-content video,
.preview-content iframe{
max-width:100%;
max-height:90vh;
border-radius:12px;
}

.admin-input{
width:100%;
padding:15px;
background:#000;
border:1px solid #333;
margin-bottom:15px;
color:white;
border-radius:8px;
box-sizing: border-box;
}

.btn-primary{
width:100%;
padding:15px;
background:#ffd11a;
border:none;
font-weight:bold;
cursor:pointer;
color: #000;
}

</style>
</head>
<body>
<header class="header-xv">
<div class="header-inner">
<div class="header-title">XV.51</div>
<button id="auth-btn" class="auth-btn" onclick="openAuthModal()">Login / Sign Up</button>
</div>
</header>
<div class="main-layout">
<!-- Top Persistent View (Video & Date always visible) -->
<div class="video-section">
    <div class="date-side">
        <div id="dynamic-date" class="date-text"></div>
        <h2 class="date-title">XV.51</h2>
        <p class="date-subtitle">TIME CAPSULES</p>
    </div>

<div class="video-wrapper">
    <video class="main-video" autoplay muted loop controls>
        <source src="assets/video/final.mp4" type="video/mp4">
    </video>
</div>

<div style="width: 100%;"></div> <!-- Spacer to perfectly center video in Grid -->
</div>
<!-- Project Description View (Hidden when user logs in) -->
<div id="unauth-text-section" class="unauth-text-section">
    <h1 style="margin-top:10px;font-size:40px;letter-spacing:4px">PROJECT XV51</h1>

<p style="max-width:600px;margin-top:10px;color:#888;font-size:16px;line-height:1.6;">
A digital archive preserving moments, memories and milestones across time.
Explore the timeline of experiences captured and shared within Project XV.51.
</p>

<button class="btn-primary" style="margin-top:25px;width:300px;border-radius:30px;" onclick="openAuthModal()">
Sign Up / Login for More Information
</button>
</div>
<!-- Authenticated View (Visible ONLY when user logs in) -->
<div id="auth-section" class="auth-view">
    <div id="timeline-container"></div>
</div>
</div>
<div id="preview-modal" class="preview-modal" onclick="closePreview()">
<div id="preview-content" class="preview-content" onclick="event.stopPropagation()"></div>
</div>
<!-- Local files script -->
<script src="uploads/files.js"></script>
<script>

/* FIREBASE INITIALIZATION */
var firebaseConfig = {
  apiKey: "AIzaSyDNUB1Btx6TN5iOoS_8eDDpW3gDvJY1um4",
  authDomain: "rajeev-ravula.firebaseapp.com",
  projectId: "rajeev-ravula",
  storageBucket: "rajeev-ravula.firebasestorage.app",
  messagingSenderId: "394520185500",
  appId: "1:394520185500:web:207254b8b546d4f6bafb59",
  measurementId: "G-MR4TK2C8N2"
};

firebase.initializeApp(firebaseConfig)
const auth=firebase.auth()

/* SET DYNAMIC DATE ON LOAD */
document.addEventListener('DOMContentLoaded', () => {
    const dateElement = document.getElementById("dynamic-date");
    if (dateElement) {
        const today = new Date();
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        dateElement.innerText = today.toLocaleDateString('en-GB', options);
    }
});

/* AUTH MODAL (DYNAMIC — DOES NOT CHANGE UI) */
let authModal=null

/* FORGOT PASSWORD */
function resetPassword(){
    const emailInput = document.getElementById("login-email");
    if(!emailInput) return;
    
    const email = emailInput.value.trim();
    
    if(!email){ 
        alert("Please enter your email address in the box first to reset your password."); 
        return; 
    }

    firebase.auth().sendPasswordResetEmail(email)
    .then(function () {
        alert("Password reset email sent! Please check your inbox/spam folder.");
    })
    .catch(function (error) {
        alert("Error: " + error.message);
    });
}

/* AUTH MODAL (DYNAMIC — DOES NOT CHANGE UI) */
function openAuthModal(){
    if(auth.currentUser){
        auth.signOut()
        return
    }

    if(!authModal){
        authModal=document.createElement("div")
        authModal.style.position="fixed"
        authModal.style.top="0"
        authModal.style.left="0"
        authModal.style.width="100vw"
        authModal.style.height="100vh"
        authModal.style.background="rgba(0,0,0,0.9)"
        authModal.style.display="flex"
        authModal.style.alignItems="center"
        authModal.style.justifyContent="center"
        authModal.style.zIndex="3000"

        authModal.innerHTML=`
        <div style="background:#111;padding:40px;border-radius:20px;width:380px">
            <h3 style="color:#ffd11a;margin-top:0">Secure Login</h3>
            
            <input id="login-email" class="admin-input" placeholder="Email">
            <input id="login-pass" type="password" class="admin-input" placeholder="Password">
            
            <button class="btn-primary" style="border-radius:8px;" onclick="emailLogin()">Login / Signup</button>
            
            <!-- Added Forgot Password Link -->
            <div style="text-align:right; margin-top:10px;">
                <a href="javascript:void(0)" onclick="resetPassword(); return false;" style="color:#ffd11a; font-size:12px; text-decoration:none; transition: 0.3s;">Forgot Password?</a>
            </div>
            
            <div style="text-align:center;margin:20px 0;color:#666;font-size:12px;letter-spacing:1px;">SOCIAL LOGIN</div>
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                <button class="btn-primary" style="border-radius:8px;" onclick="socialLogin('google')">Google</button>
                <button class="btn-primary" style="border-radius:8px;" onclick="socialLogin('microsoft')">Microsoft</button>
                <button class="btn-primary" style="border-radius:8px;" onclick="socialLogin('facebook')">Facebook</button>
                <button class="btn-primary" style="border-radius:8px;" onclick="socialLogin('twitter')">Twitter</button>
                <button class="btn-primary" style="border-radius:8px;" onclick="socialLogin('apple')">Apple</button>
                <button class="btn-primary" style="border-radius:8px;" onclick="socialLogin('yahoo')">Yahoo</button>
            </div>
            
            <br>
            <button onclick="closeAuth()" style="width:100%; padding:15px; background:#333; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Close</button>
        </div>
        `
        document.body.appendChild(authModal)
    }
    authModal.style.display="flex"
}

function closeAuth(){
    if(authModal) authModal.style.display="none"
}

/* EMAIL LOGIN / SIGNUP WITH PROPER ERROR HANDLING */
function emailLogin(){
    const email=document.getElementById("login-email").value.trim()
    const pass=document.getElementById("login-pass").value

    if(!email || !pass){ alert("Enter email and password"); return; }

    auth.signInWithEmailAndPassword(email,pass)
    .then(res=>{
        if(!res.user.emailVerified){
            res.user.sendEmailVerification()
            alert("Verification email sent")
            auth.signOut()
        }else{
            closeAuth()
        }
    })
    .catch((error)=>{
        // 1. If the user doesn't exist, create an account
        if(error.code === 'auth/user-not-found'){
            auth.createUserWithEmailAndPassword(email,pass)
            .then(res=>{
                res.user.sendEmailVerification()
                alert("Account created. Please check your email to verify it.")
            })
            .catch(e => alert(e.message))
        } 
        // 2. If the user DOES exist but typed the wrong password
        else if(error.code === 'auth/wrong-password'){
            alert("Invalid password. Please try again.");
        }
        // 3. Fallback for newer Firebase security settings (merged errors)
        else if(error.code === 'auth/invalid-credential' || error.code === 'auth/invalid-login-credentials'){
            auth.createUserWithEmailAndPassword(email,pass)
            .then(res=>{
                res.user.sendEmailVerification()
                alert("Account created. Please check your email to verify it.")
            })
            .catch(e => {
                // If account creation fails because email is used, it means they just typed the wrong password
                if(e.code === 'auth/email-already-in-use'){
                    alert("Invalid password. Please try again.");
                } else {
                    alert(e.message);
                }
            })
        }
        // 4. Any other errors (e.g., badly formatted email)
        else {
            alert(error.message);
        }
    })
}

/* SOCIAL LOGIN */
function socialLogin(type){
    let provider
    if(type==="google") provider=new firebase.auth.GoogleAuthProvider()
    if(type==="facebook") provider=new firebase.auth.FacebookAuthProvider()
    if(type==="twitter") provider=new firebase.auth.TwitterAuthProvider()
    if(type==="microsoft") provider=new firebase.auth.OAuthProvider("microsoft.com")
    if(type==="apple") provider=new firebase.auth.OAuthProvider("apple.com")
    if(type==="yahoo") provider=new firebase.auth.OAuthProvider("yahoo.com")

    auth.signInWithPopup(provider)
    .then(()=>closeAuth())
    .catch(e=>alert(e.message))
}

/* PREVIEW HANDLERS */
function openPreview(html){
    const modal=document.getElementById("preview-modal")
    const content=document.getElementById("preview-content")
    content.innerHTML=html
    modal.style.display="flex"
}

function closePreview(){
    const modal=document.getElementById("preview-modal")
    const content=document.getElementById("preview-content")
    modal.style.display="none"
    content.innerHTML="" // Stop videos/audio from playing when closed
}

/* RENDER LOCAL TIMELINE (Uses window.timelineFiles from uploads/files.js) */
function renderTimeline(entries){
    const container=document.getElementById("timeline-container")
    container.innerHTML=""

    if(!entries || entries.length === 0) return;

    // Sort descending
    entries.sort((a,b)=>new Date(b.date)-new Date(a.date))

    entries.forEach(group=>{
        const section=document.createElement("div")
        section.className="timeline-item"

        const dateText=new Date(group.date).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})
        section.innerHTML=`<div class="t-date">${dateText}</div>`

        const grid=document.createElement("div")
        grid.className="media-grid"

        group.files.forEach(file=>{
            const url=encodeURI(file)
            
            let mediaHtml=""
            let preview=""
            let mediaType="File"
            
            // Extract a title from filename to display below the media
            let filename = file.split('/').pop();
            let title = decodeURIComponent(filename.split('.')[0]);

            // 1. Match ALL Image Extensions
            if(file.match(/\.(jpg|jpeg|png|gif|webp|bmp|svg|tiff|ico)$/i)){
                mediaHtml=`<img class="media-box" src="${url}" loading="lazy">`
                preview=`<img src="${url}" loading="lazy">`
                mediaType="Image"
            }
            // 2. Match ALL Video Extensions
            else if(file.match(/\.(mp4|webm|ogg|mov|avi|mkv|flv|wmv|m4v|3gp)$/i)){
                mediaHtml=`<video class="media-box" src="${url}"></video>`
                preview=`<video src="${url}" controls autoplay></video>`
                mediaType="Video"
            }
            // 3. Match ALL Audio Extensions
            else if(file.match(/\.(mp3|wav|ogg|m4a|aac|flac|wma)$/i)){
                mediaHtml=`<div class="media-box" style="display:flex; align-items:center; justify-content:center; background:#1a1a1a;"><i class="fa-solid fa-music" style="font-size:60px; color:#ffd11a;"></i></div>`
                preview=`<audio src="${url}" controls autoplay style="outline:none; width:400px; max-width:90vw;"></audio>`
                mediaType="Audio"
            }
            // 4. Fallback for Documents (PDF, TXT, DOCX, ZIP, etc.)
            else {
                mediaHtml=`<div class="media-box" style="display:flex; align-items:center; justify-content:center; background:#1a1a1a;"><i class="fa-solid fa-file" style="font-size:60px; color:#ffd11a;"></i></div>`
                preview=`
                    <div style="text-align:center; background:#111; padding:50px; border-radius:16px; min-width:300px;">
                        <i class="fa-solid fa-file" style="font-size:80px; color:#ffd11a; margin-bottom:20px;"></i>
                        <h3 style="color:white; margin-top:0; max-width: 400px; word-wrap: break-word;">${title}</h3>
                        <a href="${url}" target="_blank" class="btn-primary" style="display:inline-block; text-decoration:none; border-radius:30px; margin-top:15px; width:auto; padding:10px 30px;">Open / Download File</a>
                    </div>`
                mediaType="Document"
            }

            const card=document.createElement("div")
            card.className="media-item"
            card.onclick=()=>openPreview(preview)

            card.innerHTML=`
                <div style="position:relative">
                    ${mediaHtml}
                </div>
                <div class="media-content">
                    <div class="media-type-tag">${mediaType}</div>
                    <div class="media-title" title="${title}">${title}</div>
                </div>
            `
            grid.appendChild(card)
        })

        section.appendChild(grid)
        container.appendChild(section)
    })
}

/* AUTHENTICATION STATE OBSERVER */
auth.onAuthStateChanged(user=>{
    const unauthSection = document.getElementById("unauth-text-section")
    const authSection = document.getElementById("auth-section")
    const btn = document.getElementById("auth-btn")

    if(user){
        // Hide the middle description text
        unauthSection.style.display="none"
        // Show the timeline area
        authSection.style.display="block"
        btn.innerText="Logout"

        // Render files locally sourced from files.js
        if(window.timelineFiles) {
            renderTimeline(window.timelineFiles)
        } else {
            console.error("timelineFiles not found. Check uploads/files.js");
        }
    }
    else{
        // Show the middle description text
        unauthSection.style.display="flex"
        // Hide the timeline area
        authSection.style.display="none"
        btn.innerText="Login / Sign Up"
    }
})

</script>
</body>
</html>
